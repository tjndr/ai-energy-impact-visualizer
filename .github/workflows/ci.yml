name: CI\n\non: [push, pull_request]\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout repository\n        uses: actions/checkout@v2\n\n      - name: Setup Node.js\n        uses: actions/setup-node@v2\n        with:\n          node-version: '16'\n\n      - name: Install dependencies\n        run: npm install\n\n      - name: Run Linter\n        run: npm run lint\n\n      - name: Run Tests\n        run: npm test\n\n      - name: Build Docker Image\n        run: |\n          docker build -t my-app .\n        env:\n          DOCKER_BUILDKIT: 1\n